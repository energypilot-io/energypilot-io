<div class="d-flex h-100">
    <app-sidenav
        [collapsed]="sidenavCollapsed()"
        [mobile]="false"
        class="d-md-inline d-none" />

    <div class="flex-grow-1">
        <div class="d-flex flex-column">
            <div class="d-flex p-2 border-bottom justify-content-between">
                <div>
                    <a
                        href="#"
                        (click)="
                            storeStatus(!sidenavCollapsed());
                            $event.preventDefault()
                        "
                        class="link-body-emphasis me-auto d-md-inline d-none">
                        <ng-icon
                            [name]="
                                sidenavCollapsed()
                                    ? 'tablerChevronRight'
                                    : 'tablerChevronLeft'
                            "
                            size="32" />
                    </a>

                    <a
                        href="#"
                        (click)="openMenuOffcanvas(); $event.preventDefault()"
                        class="link-body-emphasis me-auto d-md-none d-inline">
                        <ng-icon name="tablerMenu2" size="32" />
                    </a>
                </div>

                <div class="logo-header d-md-none d-inline">
                    {{ 'application.name' | translate }}
                </div>

                <div class="d-flex gap-3">
                    <app-language-switcher />
                    <app-theme-switcher />
                </div>
            </div>

            <div class="p-2">
                <router-outlet />
            </div>
        </div>
    </div>
</div>
