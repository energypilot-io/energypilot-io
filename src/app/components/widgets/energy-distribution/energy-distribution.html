<app-widget-base
    header="{{ 'widgets.energy-distribution.title' | translate }}"
    [name]="name"
    [canMoveUp]="canMoveUp()"
    [canMoveDown]="canMoveDown()"
    (moveUp)="moveUp()?.emit($event)"
    (moveDown)="moveDown()?.emit($event)">
    <div
        echarts
        [options]="chartOption"
        [merge]="mergeOption()"
        class="h-72 w-full"></div>
</app-widget-base>
