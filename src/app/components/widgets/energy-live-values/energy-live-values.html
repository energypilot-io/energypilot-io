<div class="card">
    <div class="card-body">
        <h5 class="card-title">Live Values</h5>
        <div class="row g-3">
            @for (deviceValue of deviceValues; track deviceValue.deviceName) {
                <div class="col-6">
                    <div class="card">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">
                                {{ deviceValue.deviceName }}
                            </h6>
                            <p class="card-text display-6">
                                {{ deviceValue.value }} {{ deviceValue.unit }}
                            </p>
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
</div>
