<div class="container-fluid">
    <div class="row gap-2">
        @for (widget of widgets(); track widget; let index = $index) {
            <ng-container
                *ngComponentOutlet="
                    widget;
                    inputs: {
                        moveUp: moveUpEvent,
                        moveDown: moveDownEvent,
                        canMoveUp: index > 0,
                        canMoveDown: index < widgets().length - 1,
                    }
                "></ng-container>
        }
    </div>
</div>
