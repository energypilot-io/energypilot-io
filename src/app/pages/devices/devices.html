<div class="d-flex flex-column gap-2">
    <div>
        <button
            type="button"
            class="btn btn-primary"
            (click)="openCreateDeviceDialog()">
            Create Device
        </button>
    </div>

    <div class="row g-2">
        @for (device of devices(); track device.id) {
            <app-device-info-card
                class="col-12 col-md-6 col-lg-4 col-xl-3"
                [device]="device" />
        }
    </div>
</div>
